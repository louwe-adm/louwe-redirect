<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUWE</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #1a1a1a;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .box { max-width: 360px; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.fallback {
    display: inline-block;
    margin-top: 16px;
    color: #fff;
    background: rgba(255,255,255,0.15);
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="box">
    <a class="fallback" id="fallback" href="#" style="display:none;">Toque aqui se não abrir automaticamente</a>
  </div>

<script>
  // ====== CONFIGURAÇÃO ======
  var DESTINATION_URL = "https://louwe.com.br/collections/vestidos-1";
  // ==========================

  document.getElementById('fallback').href = DESTINATION_URL;

  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isAndroid = /android/i.test(ua);
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

  function go(url) {
    window.location.href = url;
  }

  try {
    if (isAndroid) {
      // Android: usa intent:// para abrir direto no Chrome
      var urlNoScheme = DESTINATION_URL.replace(/^https?:\/\//, '');
      var intentUrl = "intent://" + urlNoScheme +
        "#Intent;scheme=https;package=com.android.chrome;end";
      go(intentUrl);

      // Fallback caso intent falhe
      setTimeout(function () {
        go(DESTINATION_URL);
      }, 1500);

    } else if (isIOS) {
      // iOS: tenta abrir no Safari usando x-safari-https
      go("x-safari-" + DESTINATION_URL);

      // Fallback
      setTimeout(function () {
        go(DESTINATION_URL);
      }, 1000);

    } else {
      // Desktop ou navegador não reconhecido: redirect normal
      go(DESTINATION_URL);
    }
  } catch (e) {
    go(DESTINATION_URL);
  }

  // Se nada acontecer em 3s, mostra o link manual
  setTimeout(function () {
    document.getElementById('fallback').style.display = 'inline-block';
  }, 3000);
</script>
</body>
</html>
