<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUWE</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #1a1a1a;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .box { max-width: 360px; }
  a.fallback {
    display: none;
    margin-top: 16px;
    color: #fff;
    background: rgba(255,255,255,0.15);
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
  }
  .ios-tip {
    display: none;
    font-size: 13px;
    opacity: 0.7;
    line-height: 1.5;
    margin-top: 12px;
  }
</style>
</head>
<body>
  <div class="box">
    <a class="fallback" id="fallback" href="#">Toque aqui para continuar</a>
    <p class="ios-tip" id="ios-tip">
      Ou toque em <strong>···</strong> e selecione <strong>"Abrir no navegador"</strong> para abrir no Safari
    </p>
  </div>

<script>
  // ====== CONFIGURAÇÃO ======
  var DESTINATION_URL = "https://louwe.com.br/collections/vestidos-1";
  // ==========================

  var fallback = document.getElementById('fallback');
  var iosTip = document.getElementById('ios-tip');
  fallback.href = DESTINATION_URL;

  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isAndroid = /android/i.test(ua);
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isInstagram = /Instagram/i.test(ua);

  function go(url) {
    window.location.href = url;
  }

  try {
    if (isAndroid) {
      // Android: intent:// abre direto no Chrome
      var urlNoScheme = DESTINATION_URL.replace(/^https?:\/\//, '');
      var intentUrl = "intent://" + urlNoScheme +
        "#Intent;scheme=https;package=com.android.chrome;end";
      go(intentUrl);
      // Fallback caso intent falhe
      setTimeout(function () {
        go(DESTINATION_URL);
      }, 1500);

    } else if (isIOS && isInstagram) {
      // iOS + Instagram: x-safari-https:// bloqueado pelo Meta em versões recentes.
      // Tenta mesmo assim (pode funcionar em versões antigas do app),
      // e após 1s cai no WebView (que agora funciona normalmente após
      // a correção do view-transition no base.css).
      go("x-safari-" + DESTINATION_URL);
      setTimeout(function () {
        go(DESTINATION_URL);
      }, 1000);
      // Mostra dica para abrir no Safari manualmente
      iosTip.style.display = 'block';

    } else {
      // Safari nativo, desktop, ou outro navegador: redirect direto
      go(DESTINATION_URL);
    }
  } catch (e) {
    go(DESTINATION_URL);
  }

  // Se nada acontecer em 3s, mostra o botão manual
  setTimeout(function () {
    fallback.style.display = 'inline-block';
  }, 3000);
</script>
</body>
</html>
