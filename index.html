<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUWE</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: #1a1a1a;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .box { max-width: 360px; }
  a.go {
    display: inline-block;
    color: #1a1a1a;
    background: #fff;
    padding: 14px 32px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
  }
</style>
</head>
<body>
  <div class="box">
    <a class="go" id="go" href="#">Ver coleção</a>
  </div>

<script>
  // ====== CONFIGURAÇÃO ======
  var DESTINATION_URL = "https://louwe.com.br/collections/vestidos-1";
  // ==========================

  var link = document.getElementById('go');
  link.href = DESTINATION_URL;

  // Tenta redirect automático imediato (sem intent://, evita o
  // interstitial de aviso do Instagram na maioria dos casos)
  try {
    window.location.replace(DESTINATION_URL);
  } catch (e) {
    // Se falhar, o botão "Ver coleção" continua disponível para toque manual
  }
</script>
</body>
</html>
